<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting</title>
</head>
<body>
  <p>Returning to Bitget Wallet…</p>
  <p><a id="open" href="#">123</a></p>

  <script>
    (function () {
      // 优先读 URL 参数：?code=...&id_token=...&state=...
      // 若服务端是直接渲染页面，也可改成写死：
      var params = new URLSearchParams(window.location.search);

      var statePkg = (params.get('state') || '').trim();
      var pkg = statePkg;

      if (!params.get('code') && !params.get('id_token')) {
        document.body.innerHTML =
          '<p>Invalid Apple callback. Please return to the app.</p>';
        return;
      }

      var intentUrl =
        'intent://callback?' +
        params.toString() +
        '#Intent;package=' +
        pkg +
        ';scheme=signinwithapple;end';

      var open = document.getElementById('open');
      if (open) {
        open.href = intentUrl;
      }

      // 自动跳回 App
      location.replace(intentUrl);
    })();
  </script>
</body>
</html>
